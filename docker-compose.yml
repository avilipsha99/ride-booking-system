services:

  postgres:
    image: postgres:15
    container_name: ride-postgres
    environment:
      POSTGRES_USER: rideuser
      POSTGRES_PASSWORD: ridepass
      POSTGRES_DB: ridedb
      PGTZ: UTC
      TZ: UTC
    ports:
      - "5432:5432"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - postgres
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ridedb
      SPRING_DATASOURCE_USERNAME: rideuser
      SPRING_DATASOURCE_PASSWORD: ridepass

  ride-service:
    build: ./ride-service
    container_name: ride-service
    depends_on:
      - postgres
      - kafka
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ridedb
      SPRING_DATASOURCE_USERNAME: rideuser
      SPRING_DATASOURCE_PASSWORD: ridepass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  driver-service:
    build: ./driver-service
    container_name: driver-service
    depends_on:
      - postgres
      - kafka
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ridedb
      SPRING_DATASOURCE_USERNAME: rideuser
      SPRING_DATASOURCE_PASSWORD: ridepass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092